version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apt_web_server
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html
      - ./uploads:/var/www/html/uploads
      - ./apache-config/000-default.conf:/etc/apache2/sites-available/000-default.conf
    depends_on:
      - db
    networks:
      - apt_network
    restart: always

  db:
    image: mysql:8.0
    container_name: apt_mysql_db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: apt_database
      MYSQL_USER: aptuser
      MYSQL_PASSWORD: aptpass123
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"
    networks:
      - apt_network
    restart: always

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: apt_phpmyadmin
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: rootpass123
      UPLOAD_LIMIT: 100M
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - apt_network
    restart: always

networks:
  apt_network:
    driver: bridge

volumes:
  db_data:
